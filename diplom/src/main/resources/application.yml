server:
  port: 8080

spring:
  application:
    name: hwsm-telegram-bot
  
  datasource:
    url: jdbc:postgresql://localhost:5432/hwsmdev
    username: hwsmdev
    password: HwSm2024!SecureP@ssw0rd#Dev
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    ru.otus.hwsm: DEBUG
    org.springframework: INFO
    org.hibernate: INFO
    org.telegram: INFO
    org.telegram.telegrambots: DEBUG  # Добавляем для отладки Telegram
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Конфигурация Telegram Bot для версии 9.x (исправленная)
