server:
  port: 8080

spring:
  application:
    name: hwsm-telegram-bot
  config:
    import: optional:file:diplom/application-local.properties

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hwsmdev}
    username: ${SPRING_DATASOURCE_USERNAME:hwsmdev}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    ru.otus.hwsm: DEBUG
    org.springframework: INFO
    org.springframework.boot.context.config: DEBUG  # Отладка загрузки конфигурации
    org.springframework.core.env: DEBUG              # Отладка PropertySource
    org.hibernate: INFO
    org.telegram: INFO
    org.telegram.telegrambots: DEBUG  # Добавляем для отладки Telegram
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Конфигурация Telegram Bot для версии 9.x (исправленная)
telegram:
  bot:
    # Токен и имя теперь будут загружаться ТОЛЬКО из переменных окружения
    # Удаляем значения по умолчанию, чтобы приложение падало, если они не заданы
    # Это повышает безопасность
    token: ${TELEGRAM_BOT_TOKEN}
    username: ${TELEGRAM_BOT_USERNAME}
  bots:
    enabled: true

# Application specific settings
hwsm:
  game:
    questions-per-game: 15
    time-limit-seconds: 30
    prize-levels:
      - 100
      - 200
      - 300
      - 500
      - 1000
      - 2000
      - 4000
      - 8000
      - 16000
      - 32000
      - 64000
      - 125000
      - 250000
      - 500000
      - 1000000